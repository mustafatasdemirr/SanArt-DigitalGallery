<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edebiyat Galerisi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="hero-section d-flex align-items-center justify-content-center text-center text-white">
        <div class="overlay"></div>
        <div class="content container">
            <h1 class="display-1 main-title"> Edebiyat Galerisi-SanArt</h1>
            <p class="lead sub-title">Galeri Açılışından Beri Geçen Zaman</p>
            
            <div id="counter" class="d-flex justify-content-center flex-wrap gap-3 mt-4">
                <div class="time-box"><span id="days">0</span> Gün</div>
                <div class="time-box"><span id="hours">0</span> Saat</div>
                <div class="time-box"><span id="minutes">0</span> Dakika</div>
                <div class="time-box"><span id="seconds">0</span> Saniye</div>
            </div>
            
            <a href="#poetry-section" class="btn btn-outline-light mt-5 rounded-pill px-4">Sanat Duvarına Git <i class="fas fa-arrow-down"></i></a>
        </div>
    </section>

    <section id="poetry-section" class="py-5 bg-light">
        <div class="container">
            <div class="text-center mb-5">
                <h2 class="section-title">Sanat Duvarı</h2>
            </div>

            <div class="card shadow-lg border-0 mb-5 mx-auto" style="max-width: 600px;">
                <div class="card-body p-4">
                    <input type="text" id="poemTitle" class="form-control mb-2" placeholder="Başlık">
                    <textarea id="poemText" class="form-control mb-2" rows="3" placeholder="Not,şiir veya güne mesaj..."></textarea>
                    <input type="file" id="imageFile" class="form-control mb-3" accept="image/*">
                        <div id="loadingMsg" class="text-center text-danger mb-2" style="display: none;">Resim yükleniyor, bekleyiniz...</div>
                    <button onclick="addPoem()" class="btn btn-danger w-100 rounded-pill">Duvara As ❤️</button>
                </div>
            </div>

            <div class="row g-4" id="poemList">
                </div>
                <footer class="footer-section text-center pb-4 pt-5">
                    <a href="https://github.com/mustafatasdemirr" target="_blank" class="glass-footer d-inline-block px-5 py-3 text-decoration-none">
                        <p class="mb-0 fw-bold">Developed 💻 by Mustafa TAŞDEMİR</p>
                        <small class="footer-date">Sanata ve sanattan anlayan naif ruhlara adanmıştır.</small>
                    </a>
                </footer>   
        </div>
    </section>
    <audio id="player" loop>
        <source src="sarki.mp3" type="audio/mp3">
    </audio>

    <div class="music-control" id="musicBtn">
        <div class="music-icon">
            <i class="fas fa-music"></i>
        </div>
        <span class="music-text">Müzik</span>
    </div>
    <script type="module" src="script.js"></script>
    
</body>
</html>
